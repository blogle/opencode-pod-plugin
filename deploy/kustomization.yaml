apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - plugin-serviceaccount.yaml
  - plugin-role.yaml
  - plugin-rolebinding.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - package-cache-pvc.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: opencode-k8s-sandbox
    includeSelectors: false

images:
  - name: opencode-k8s-sandbox-router
    newName: ghcr.io/ogletanner/opencode-k8s-sandbox-router
    newTag: latest
