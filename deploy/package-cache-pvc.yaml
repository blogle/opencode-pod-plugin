apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-package-cache
  namespace: opencode-sandbox
  labels:
    app.kubernetes.io/name: opencode-k8s-sandbox-package-cache
    app.kubernetes.io/managed-by: opencode-k8s-sandbox
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  # ponytail: storageClassName left unset to use cluster default.
  # Set to a local/hostpath class if you want node-local caching.
