apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opencode-k8s-sandbox-plugin
  namespace: opencode-sandbox
  labels:
    app.kubernetes.io/name: opencode-k8s-sandbox-plugin
    app.kubernetes.io/managed-by: opencode-k8s-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
