apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-k8s-sandbox-router
  namespace: opencode-sandbox
  labels:
    app.kubernetes.io/name: opencode-k8s-sandbox-router
    app.kubernetes.io/managed-by: opencode-k8s-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opencode-k8s-sandbox-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencode-k8s-sandbox-router
        app.kubernetes.io/managed-by: opencode-k8s-sandbox
    spec:
      serviceAccountName: opencode-k8s-sandbox-router
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: router
          image: opencode-k8s-sandbox-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 9090
              protocol: TCP
          env:
            - name: ROUTER_PROXY_ADDR
              value: "0.0.0.0:8080"
            - name: ROUTER_HEALTH_ADDR
              value: "0.0.0.0:9090"
            - name: ROUTER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTER_LOG
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
