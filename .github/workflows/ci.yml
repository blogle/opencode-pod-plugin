name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  router-lint-test:
    name: Router (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: router

      - name: Format check
        run: cargo fmt --check
        working-directory: router

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: router

      - name: Test
        run: cargo test
        working-directory: router

  plugin-lint-test:
    name: Plugin (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: plugin

      - name: Type check
        run: npx tsc --noEmit
        working-directory: plugin

      - name: Test
        run: npm test
        working-directory: plugin

  validate-manifests:
    name: Validate Kustomize manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.1"

      - name: Validate kustomize build
        run: kustomize build deploy
